<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>


<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 230px;
    background: #1d1d2c;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar p {
    margin: 12px 0;
    cursor: pointer;
    transition: 0.3s;
    font-size: 20px;
}

.sidebar p:hover {
    color: #00f5d4;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

/* Topbar */
.topbar {
    font-size: 28px;
    font-weight: bold;
    color: rgb(63, 30, 50);
    margin-bottom: 20px;
    margin-left:20px ;
}

/* Card */
.card {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    backdrop-filter: blur(5px);
}

/* Inputs */
input, select {
    width: 97%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Button */
button {
    padding: 11px 18px;
    background: linear-gradient(135deg, #ff6ec4, #7873f5);
    color: white;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 15px;
   
}

button:hover {
    transform: scale(1.05);
    
}

/* Answer */
#answer {
    font-size: 18px;
    color: #333;
}

/* Chart */
#chart {
    margin-top: 20px;
}

.dashboard-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr; /* or your value */
    gap: 20px;
    margin-top: 20px;   /* 👈 ADD THIS */
  }


.input-card {
    height: fit-content;
    min-height: 450px;
}

.output-section {
    display: flex;
    flex-direction: column;
    gap: 20px;

}

.title-box {
    text-align: center;
    font-size: 32px;
    font-weight: 600;
    color: rgb(252, 249, 249);
    background: #61a0b4;
    
   
    padding: 15px;
    border-radius: 12px;
    width: fit-content;
    margin: 0 auto 30px auto;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <p>Analytics</p>
        <p>Reports</p>
        <p>Settings</p>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="title-box">
    Analytics Dashboard
        </div>

        <div class="dashboard-grid">

            <!-- LEFT: INPUT PANEL -->
            <div class="card input-card">

                <h3>Ask Anything</h3>

                <label>Data Source</label>
                <select id="sourceType" onchange="toggleMongoFields()">
                    <option value="auto">Auto</option>
                    <option value="pdf">PDF</option>
                    <option value="csv">CSV</option>
                    <option value="mongo">MongoDB</option>
                </select>

                <label>File Path / URI</label>
                <input type="text" id="sourceInput">

                <div id="mongoFields" class="mongo-fields">
                    <input type="text" id="mongoDatabase" placeholder="Database">
                    <input type="text" id="mongoCollection" placeholder="Collection">
                    <input type="text" id="mongoLimit" placeholder="Limit">
                </div>

                <label>Question</label>
                <input type="text" id="queryInput" placeholder="Type your question...">

                <button onclick="sendQuery()">Submit</button>

            </div>

            <!-- RIGHT: OUTPUT PANEL -->
            <div class="output-section">

                <!-- Answer Card -->
                <div class="card">
                    <h3> Answer</h3>
                    <div id="answer"></div>
                    <div id="source"></div>
                </div>

                <!-- Chart Card -->
                <div class="card">
                    <h3> Visualization</h3>
                    <div id="chart"></div>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
